<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatApp · Grupo 06</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/chat.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>

    <!-- ================================================
         APP WRAPPER
    ================================================== -->
    <div class="app-layout" id="appLayout">

      <!-- ============================================
           SIDEBAR (Rol 02 — sidebar.js lo controla)
      ============================================= -->
      <aside class="sidebar" id="sidebar">

        <!-- Header -->
        <div class="sidebar__header">
          <h1 class="sidebar__title">Mesa Chat</h1>
          <button class="btn-nuevo-chat" id="btnNuevoChat">
            <!-- ícono cuadrado con lápiz -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
            Nuevo Chat
          </button>

          <!-- Búsqueda -->
          <div class="sidebar__search">
            <svg class="sidebar__search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Buscar mensajes..." autocomplete="off" />
          </div>
        </div>

        <!-- Tabs: Mensajes / Contactos -->
        <nav class="sidebar__nav">
          <button class="sidebar__nav-btn active" data-tab="mensajes" id="tabMensajes">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
            Mensajes
          </button>
          <button class="sidebar__nav-btn" data-tab="contactos" id="tabContactos">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            Contactos
          </button>
        </nav>

        <!-- Lista de chats (la renderiza sidebar.js) -->
        <div class="sidebar__list" id="chatList">
          <!-- Las chat-cards se insertan dinámicamente -->
        </div>

        <!-- Footer: perfil del usuario logueado -->
        <div class="sidebar__footer" id="sidebarFooter">
          <div class="sidebar__footer-avatar">
            <img src="assets/img/user-avatar.png" alt="Mi perfil"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
            <div class="chat-card__avatar-placeholder" style="display:none; width:36px; height:36px; font-size:.85rem;" id="footerAvatarPlaceholder">U</div>
          </div>
          <div class="sidebar__footer-info">
            <div class="sidebar__footer-name" id="footerUserName">Mi Nombre</div>
            <div class="sidebar__footer-status" id="footerUserStatus">Disponible</div>
          </div>
          <button class="sidebar__footer-settings" title="Configuración" onclick="window.location.href='index.html'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 width="18" height="18">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06
                       a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0
                       009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06
                       A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6
                       9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65
                       0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65
                       0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a
                       1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
          </button>
        </div>

      </aside><!-- /sidebar -->


      <!-- ============================================
           PANEL DE CHAT (Rol 03 — chat.js lo controla)
      ============================================= -->
      <main class="chat-panel" id="chatPanel">

        <!-- Estado vacío: ningún chat seleccionado -->
        <div class="chat-panel--empty" id="chatEmpty" style="display:flex;">
          <div class="empty-state">
            <div class="empty-state-icon">💬</div>
            <h3>Seleccioná un chat</h3>
            <p>Elegí una conversación del panel izquierdo<br>para empezar a chatear.</p>
          </div>
        </div>

        <!-- Vista de chat activo (se muestra al seleccionar un contacto) -->
        <div id="chatActive" style="display:none; flex-direction:column; height:100%;">

          <!-- Header -->
          <header class="chat-header" id="chatHeader">
            <!-- Botón volver (solo mobile) -->
            <button class="chat-header__back" id="btnBack" title="Volver">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                   width="20" height="20">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
            </button>

            <!-- Avatar del contacto -->
            <div class="chat-header__avatar">
              <img id="headerAvatar" src="" alt="" />
              <div class="chat-header__avatar-placeholder" id="headerAvatarPlaceholder" style="display:none;"></div>
              <span class="chat-header__status-dot" id="headerStatusDot"></span>
            </div>

            <!-- Nombre y estado -->
            <div class="chat-header__info">
              <p class="chat-header__name" id="headerName">—</p>
              <p class="chat-header__sub" id="headerSub">
                <span id="headerStatus">En línea</span>
                <span class="chat-header__typing" id="headerTyping">escribiendo...</span>
              </p>
            </div>

            <!-- Acciones del header -->
            <div class="chat-header__actions">
              <button class="chat-header__action-btn" title="Buscar en el chat" id="btnSearchChat">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
              </button>
            </div>
          </header>

          <!-- Área de mensajes -->
          <div class="chat-messages" id="chatMessages">
            <!-- Los mensajes se insertan dinámicamente por chat.js -->
          </div>

          <!-- Indicador "escribiendo..." -->
          <div class="typing-indicator" id="typingIndicator">
            <div class="typing-indicator__avatar">
              <img id="typingAvatar" src="" alt="" />
            </div>
            <div class="typing-indicator__bubble">
              <span class="typing-dot"></span>
              <span class="typing-dot"></span>
              <span class="typing-dot"></span>
            </div>
          </div>

          <!-- Input de mensaje -->
          <div class="chat-input-area">
            <button class="chat-input-area__btn btn-emoji" id="btnEmoji" title="Emoji">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   width="20" height="20">
                <circle cx="12" cy="12" r="10"/>
                <path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/>
                <line x1="15" y1="9" x2="15.01" y2="9"/>
              </svg>
            </button>

            <textarea
              class="chat-input-area__field"
              id="msgInput"
              placeholder="Escribe un mensaje..."
              rows="1"
              autocomplete="off"
            ></textarea>

            <button class="chat-input-area__btn btn-send" id="btnSend" title="Enviar" disabled>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>

          <!-- Pie de seguridad -->
          <p class="chat-secure-label">CHAT SEGURO Y CIFRADO</p>

        </div><!-- /chatActive -->

      </main><!-- /chat-panel -->

    </div><!-- /app-layout -->

    <!-- Menú contextual de mensaje (compartido, posición absoluta) -->
    <div class="message-context-menu" id="contextMenu" style="display:none;">
      <div class="message-context-menu__item" id="ctxReact">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/>
          <line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
        Reaccionar
      </div>
      <div class="message-context-menu__item danger" id="ctxDelete">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
        Eliminar mensaje
      </div>
    </div>

    <!-- Scripts (orden importante) -->
    <script src="js/data/contacts.js"></script>
    <script src="js/data/responses.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/bot.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/ui.js"></script>

  </body>
</html>
